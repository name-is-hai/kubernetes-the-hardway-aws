apiVersion: apps/v1
kind: Deployment
metadata:
  name: smoke-app
  namespace: smoke-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: smoke-app
  template:
    metadata:
      labels:
        app: smoke-app
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
