- name: Load required kernel modules
  modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - overlay
    - br_netfilter

- name: Persist Kubernetes kernel modules
  copy:
    dest: /etc/modules-load.d/k8s.conf
    mode: "0644"
    content: |
      overlay
      br_netfilter

- name: Configure Kubernetes sysctl values
  copy:
    dest: /etc/sysctl.d/99-kubernetes-cri.conf
    mode: "0644"
    content: |
      net.bridge.bridge-nf-call-iptables = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward = 1
  notify: Reload sysctl

- name: Ensure containerd is running
  service:
    name: containerd
    state: started
    enabled: true

- name: Verify containerd binary exists
  command: containerd --version
  changed_when: false

- name: Verify kubectl binary exists
  command: kubectl version --client
  changed_when: false

- name: Verify kubelet binary exists
  command: kubelet --version
  changed_when: false

- name: Verify crictl binary exists
  command: crictl --version
  changed_when: false

- name: Disable swap immediately
  command: swapoff -a
  changed_when: false
  when: ansible_swaptotal_mb | int > 0

- name: Disable swap entries in fstab
  replace:
    path: /etc/fstab
    regexp: '^([^#].*\s+swap\s+.*)$'
    replace: '# \1'

- name: Verify swap is disabled
  command: swapon --show
  register: swap_status
  changed_when: false
  failed_when: swap_status.stdout | length > 0

- name: Ensure chronyd is running
  service:
    name: chronyd
    state: started
    enabled: true

- name: Verify chrony tracking
  command: chronyc tracking
  register: chrony_tracking
  changed_when: false
