      --client-key={{ pki_dir }}/{{ item }}.key
      --embed-certs=true
      --kubeconfig={{ kubeconfig_dir }}/{{ item }}.kubeconfig
  delegate_to: localhost
  loop: "{{ groups['role_worker'] }}"
  run_once: true
  become: false

- name: Set woker context
  command:
    cmd: >
      kubectl config set-context default
      --cluster={{ cluster_name }}
      --user={{ item }}
      --kubeconfig={{ kubeconfig_dir }}/{{ item }}.kubeconfig
  delegate_to: localhost
  loop: "{{ groups['role_worker'] }}"
  run_once: true
  become: false

- name: Use worker context
  command:
    cmd: kubectl config use-context default --kubeconfig={{ kubeconfig_dir }}/{{ item }}.kubeconfig
  delegate_to: localhost
  loop: "{{ groups['role_worker'] }}"
  run_once: true
  become: false
