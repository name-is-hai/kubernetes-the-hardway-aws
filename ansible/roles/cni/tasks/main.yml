- name: Wait for node PodCIDR assignment
  shell: >
    kubectl --kubeconfig /var/lib/kubelet/kubeconfig
    get node {{ inventory_hostname }}
    -o jsonpath='{.spec.podCIDR}'
  register: node_pod_cidr
  changed_when: false
  until: node_pod_cidr.stdout | length > 0
  retries: 30
  delay: 5

- name: Create CNI config directory
  file:
    path: /etc/cni/net.d
    state: directory
    mode: "0755"

- name: Render bridge CNI config
  template:
    src: 10-bridge.conf.j2
    dest: /etc/cni/net.d/10-bridge.conf
    mode: "0644"
  notify: Restart kubelet

- name: Render loopback CNI config
  copy:
    dest: /etc/cni/net.d/99-loopback.conf
    mode: "0644"
    content: |
      {
        "cniVersion": "1.0.0",
        "name": "lo",
        "type": "loopback"
      }
  notify:
    - Restart containerd
    - Restart kubelet
