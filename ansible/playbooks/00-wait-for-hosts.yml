- name: Verify and Wait for 6 SSM Nodes
  hosts: all
  gather_facts: false

  tasks:
    - name: Ensure exactly 6 nodes were discovered by the tag filter
      assert:
        that:
          - ansible_play_hosts | length == 6
        fail_msg: "Safety Abort! Expected 6 nodes, but found {{ ansible_play_hosts | length }}."
        success_msg: "Exactly 6 tagged nodes found in inventory. Checking connection health..."
      run_once: true

    - name: Wait for SSM agent to register and connect
      wait_for_connection:

    - name: Run a test ping over SSM
      ping:
