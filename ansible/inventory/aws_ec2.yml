plugin: amazon.aws.aws_ec2
regions:
  - us-east-1

filters:
  tag:Project: k8s-hardway
  tag:Environment: dev
  instance-state-name: running

keyed_groups:
  - key: tags.Role
    prefix: role

hostnames:
  - tag:Name
  - instance-id

compose:
  ansible_host: instance_id
  ansible_aws_ssm_instance_id: instance_id
